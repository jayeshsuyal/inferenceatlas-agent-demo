name: smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  offline-decision-packet:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install public CLI package
        run: python -m pip install -e .

      - name: Compile Python modules
        run: python -m py_compile agent/*.py agent/adapters/*.py agent/mind/*.py web/*.py

      - name: Verify installable public commands
        run: |
          ia-judge --no-write
          ia-judge --no-write --json >/tmp/installed_judge_harness.json
          ia-skills
          ia-skills --json >/tmp/installed_agent_skills.json
          ia-packet-diff --no-write
          ia-packet-diff --no-write --json >/tmp/installed_packet_diff.json
          ia-outcome-memo --no-write
          ia-outcome-memo --no-write --json >/tmp/installed_outcome_memo.json
          ia-contract --all
          ia-proof-health --no-write
          ia-proof-health --no-write --json >/tmp/installed_proof_health.json
          ia-sponsor-readiness --no-write
          ia-sponsor-readiness --no-write --json >/tmp/installed_sponsor_readiness.json
          ia-trial examples/requests/support_triage_trial.yml
          ia-trial examples/requests/support_triage_trial.yml --json >/tmp/installed_trial_report.json
          ia-trial-outcome-memo examples/requests/support_triage_trial.yml
          ia-trial-outcome-memo examples/requests/support_triage_trial.yml --json >/tmp/installed_trial_outcome_memo.json
          ia-verify-artifacts
          ia-verify-artifacts --json >/tmp/installed_artifact_integrity.json

      - name: Parse DecisionPacket schema
        run: |
          python -m json.tool schemas/decision_packet.schema.json >/tmp/decision_packet_schema.json
          python -m json.tool schemas/agent_access_decision_brief.schema.json >/tmp/agent_access_decision_brief_schema.json

      - name: Run no-key offline demo
        env:
          NEBIUS_API_KEY: ""
          TAVILY_API_KEY: ""
          COMPOSIO_API_KEY: ""
          IA_LIVE_MODE: ""
        run: python -m agent.demo

      - name: Regenerate scenario artifacts
        run: python -m agent.scenarios

      - name: Run scenario review CLI
        run: |
          python -m agent.review --list
          python -m agent.review --scenario admin_code_fix_bot
          python -m agent.review --scenario read_only_analytics_agent --artifact packet --format json >/tmp/read_only_analytics_agent.cli.packet.json
          python -m agent.packet_diff --no-write --json >/tmp/packet_diff.cli.json
          python -m agent.outcome_memo --no-write --json >/tmp/outcome_memo.cli.json
          python -m agent.trial_outcome_memo examples/requests/support_triage_trial.yml --no-write --json >/tmp/trial_outcome_memo.cli.json

      - name: Validate public conformance contract
        run: |
          python -m agent.contract --all
          python -m agent.contract --all --generated-dir examples/generated --json >/tmp/public_contract.generated.json

      - name: Evaluate policy gate
        run: |
          python -m agent.gate --all
          python -m agent.gate --all --json >/tmp/policy_gate.all.json
          python -m agent.gate --scenario admin_code_fix_bot >/tmp/policy_gate.admin.md

      - name: Render sponsor adapter contracts
        run: |
          python -m agent.adapters --all
          python -m agent.adapters --all --json >/tmp/sponsor_adapters.all.json
          python -m agent.sponsor_readiness
          python -m agent.sponsor_readiness --no-write --json >/tmp/sponsor_live_readiness.json

      - name: Generate trust receipt
        run: |
          python -m agent.trust
          python -m agent.trust --print-json trust_receipt >/tmp/trust_receipt.cli.json

      - name: Generate packet decision surfaces
        run: |
          python -m agent.packet_diff
          python -m agent.outcome_memo

      - name: Generate static review room
        run: python -m agent.review_room

      - name: Generate proof health
        run: |
          python -m agent.proof_health
          python -m agent.proof_health --no-write --json >/tmp/proof_health.json

      - name: Run design partner trial runner
        run: |
          python -m agent.trial examples/requests/support_triage_trial.yml
          python -m agent.trial examples/requests/support_triage_trial.yml --write
          python -m agent.trial examples/requests/support_triage_trial.yml --json >/tmp/design_partner_trial_report.json
          python -m agent.trial_outcome_memo examples/requests/support_triage_trial.yml
          python -m agent.trial_outcome_memo examples/requests/support_triage_trial.yml --json >/tmp/design_partner_outcome_memo.json

      - name: Run judge harness
        run: |
          python -m agent.judge
          python -m agent.judge --json >/tmp/judge_harness.json

      - name: Parse generated packet artifacts
        run: |
          python -m json.tool examples/generated/support_triage_agent.packet.json >/tmp/support_triage_agent.packet.json
          python -m json.tool examples/generated/support_triage_agent.trace.json >/tmp/support_triage_agent.trace.json
          python -m json.tool examples/generated/support_triage_agent.decision_brief.json >/tmp/support_triage_agent.decision_brief.json
          python -m json.tool examples/generated/read_only_analytics_agent.packet.json >/tmp/read_only_analytics_agent.packet.json
          python -m json.tool examples/generated/read_only_analytics_agent.decision_brief.json >/tmp/read_only_analytics_agent.decision_brief.json
          python -m json.tool examples/generated/admin_code_fix_bot.packet.json >/tmp/admin_code_fix_bot.packet.json
          python -m json.tool examples/generated/admin_code_fix_bot.decision_brief.json >/tmp/admin_code_fix_bot.decision_brief.json
          python -m json.tool examples/generated/trust_receipt.json >/tmp/trust_receipt.json
          python -m json.tool examples/generated/packet_diff.json >/tmp/packet_diff.json
          python -m json.tool examples/generated/support_triage_agent.outcome_memo.json >/tmp/support_triage_agent.outcome_memo.json
          python -m json.tool examples/generated/sponsor_live_readiness.json >/tmp/sponsor_live_readiness.artifact.json
          python -m json.tool examples/generated/review_room.json >/tmp/review_room.json
          python -m json.tool examples/generated/support_triage_agent.proof_health.json >/tmp/support_triage_agent.proof_health.json
          python -m json.tool examples/generated/support_triage_trial_report.json >/tmp/support_triage_trial_report.json
          python -m json.tool examples/generated/support_triage_trial.packet.json >/tmp/support_triage_trial_packet.json
          python -m json.tool examples/generated/support_triage_trial.decision_brief.json >/tmp/support_triage_trial_decision_brief.json
          python -m json.tool examples/generated/support_triage_trial.outcome_memo.json >/tmp/support_triage_trial_outcome_memo.json
          test -s examples/generated/review_room.html
          test -s examples/generated/review_room.desktop.jpg
          test -s docs/REVIEW_ROOM_WALKTHROUGH.md
          python -m json.tool /tmp/judge_harness.json >/tmp/judge_harness.checked.json
          python -m json.tool /tmp/installed_agent_skills.json >/tmp/installed_agent_skills.checked.json
          python -m json.tool /tmp/installed_trial_report.json >/tmp/installed_trial_report.checked.json
          python -m json.tool /tmp/installed_trial_outcome_memo.json >/tmp/installed_trial_outcome_memo.checked.json
          python -m json.tool /tmp/installed_artifact_integrity.json >/tmp/installed_artifact_integrity.checked.json
          python -m json.tool /tmp/installed_packet_diff.json >/tmp/installed_packet_diff.checked.json
          python -m json.tool /tmp/installed_outcome_memo.json >/tmp/installed_outcome_memo.checked.json
          python -m json.tool /tmp/packet_diff.cli.json >/tmp/packet_diff.cli.checked.json
          python -m json.tool /tmp/outcome_memo.cli.json >/tmp/outcome_memo.cli.checked.json
          python -m json.tool /tmp/trial_outcome_memo.cli.json >/tmp/trial_outcome_memo.cli.checked.json
          python -m json.tool /tmp/installed_proof_health.json >/tmp/installed_proof_health.checked.json
          python -m json.tool /tmp/proof_health.json >/tmp/proof_health.checked.json
          python -m json.tool /tmp/installed_sponsor_readiness.json >/tmp/installed_sponsor_readiness.checked.json
          python -m json.tool /tmp/design_partner_trial_report.json >/tmp/design_partner_trial_report.checked.json
          python -m json.tool /tmp/design_partner_outcome_memo.json >/tmp/design_partner_outcome_memo.checked.json
          python -m json.tool /tmp/trust_receipt.cli.json >/tmp/trust_receipt.cli.checked.json
          python -m json.tool /tmp/policy_gate.all.json >/tmp/policy_gate.all.checked.json
          python -m json.tool /tmp/sponsor_adapters.all.json >/tmp/sponsor_adapters.all.checked.json
          python -m json.tool /tmp/sponsor_live_readiness.json >/tmp/sponsor_live_readiness.checked.json
          python -m json.tool policy/agent_access.yml >/tmp/policy_agent_access.json

      - name: Run unit tests
        env:
          NEBIUS_API_KEY: ""
          TAVILY_API_KEY: ""
          COMPOSIO_API_KEY: ""
          IA_LIVE_MODE: ""
        run: python -m unittest discover -s tests

      - name: Mind runtime E2E (offline)
        env:
          NEBIUS_API_KEY: ""
          TAVILY_API_KEY: ""
          COMPOSIO_API_KEY: ""
        run: python -m agent.mind e2e
