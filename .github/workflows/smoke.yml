name: smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  offline-decision-packet:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python modules
        run: python -m py_compile agent/*.py

      - name: Parse DecisionPacket schema
        run: python -m json.tool schemas/decision_packet.schema.json >/tmp/decision_packet_schema.json

      - name: Run no-key offline demo
        env:
          NEBIUS_API_KEY: ""
          TAVILY_API_KEY: ""
          COMPOSIO_API_KEY: ""
          IA_LIVE_MODE: ""
        run: python -m agent.demo

      - name: Parse generated packet artifacts
        run: |
          python -m json.tool examples/generated/support_triage_agent.packet.json >/tmp/support_triage_agent.packet.json
          python -m json.tool examples/generated/support_triage_agent.trace.json >/tmp/support_triage_agent.trace.json

      - name: Run unit tests
        env:
          NEBIUS_API_KEY: ""
          TAVILY_API_KEY: ""
          COMPOSIO_API_KEY: ""
          IA_LIVE_MODE: ""
        run: python -m unittest discover -s tests
